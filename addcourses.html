    <main class="addCourses">

<form action="">
    <div>
        <label for="courseName">Course Name:</label>

        <input 
        type="text"
        required 
        name="courseName"
        id="courseName"
       
        />
    </div>

     <div>

        type="text"
        required 
        name="courseName"
        id="courseName"
       
        />

        type="text"
        required 
        name="courseName"
        id="courseName"
        />
    </div>

     <div>
